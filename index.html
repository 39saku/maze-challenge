<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Challenge</title>
    <!-- Socket.ioライブラリを追加 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <header>
        <h1>Maze Challenge</h1>
        <div id="user-info">名前: <span id="display-name">---</span></div>
        <div id="level-selector"></div>
    </header>
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h2>ニックネームを入力</h2>
            <input type="text" id="nickname-input" maxlength="15" placeholder="例：プログラミング太郎">
            <button onclick="saveNickname()">開始する</button>
        </div>
    </div>
    <main id="game-container"></main>
    <script src="data/maps.js"></script>
    <script src="core/engine.js"></script>
    <script src="core/renderer.js"></script>
    <script src="student/student_code_1.js"></script>
    <script src="student/student_code_2.js"></script>
    <script src="student/student_code_3.js"></script>
</body>

</html>
